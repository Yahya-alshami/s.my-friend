<div id="intro">

       ✨بعض الأشخاص يستحقون صفحة مثلك✨

        </button>

</div>

<div class="background-animation"></div>

<div id="hearts"></div>

<div class="container">

<h1 class="main-title">
💖 إلى أجمل صديقة 💖
</h1>

<p class="message">

وجودك من أجمل الأشياء،
وبتمنى أنو تضلي دائمًا سعيدة،
لأنك بتستهلي كل الخير،
وهاد المكان البسيط ساويتو بس ليُرسم على وجهك ابتسامة جميلة. 🌸❤️

</p>
